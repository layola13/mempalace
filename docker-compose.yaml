services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  mempalace:
    build:
      context: .
      dockerfile: Dockerfile
    image: mempalace-runtime:latest
    depends_on:
      qdrant:
        condition: service_started
    environment:
      MEMPALACE_QDRANT_HOST: qdrant
      MEMPALACE_QDRANT_PORT: 6333
      MEMPALACE_QDRANT_GRPC_PORT: 6334
      MEMPALACE_OLLAMA_URL: http://115.231.236.153:11434
      MEMPALACE_EMBEDDING_MODEL: mxbai-embed-large:latest
      MEMPALACE_EMBEDDING_DIMENSION: 1024
      MEMPALACE_REQUEST_TIMEOUT_SECONDS: 120
    volumes:
      - ~/.mempalace:/root/.mempalace
      - .:/app
    entrypoint: ["python", "-m", "mempalace"]
    command: ["--help"]

  mempalace-cli:
    image: mempalace-runtime:latest
    depends_on:
      qdrant:
        condition: service_started
    environment:
      MEMPALACE_QDRANT_HOST: qdrant
      MEMPALACE_QDRANT_PORT: 6333
      MEMPALACE_QDRANT_GRPC_PORT: 6334
      MEMPALACE_OLLAMA_URL: http://115.231.236.153:11434
      MEMPALACE_EMBEDDING_MODEL: mxbai-embed-large:latest
      MEMPALACE_EMBEDDING_DIMENSION: 1024
      MEMPALACE_REQUEST_TIMEOUT_SECONDS: 120
    volumes:
      - ~/.mempalace:/root/.mempalace
      - .:/app
    entrypoint: ["python", "-m", "mempalace"]
    command: ["--help"]

  mempalace-mcp:
    image: mempalace-runtime:latest
    depends_on:
      qdrant:
        condition: service_started
    environment:
      MEMPALACE_QDRANT_HOST: qdrant
      MEMPALACE_QDRANT_PORT: 6333
      MEMPALACE_QDRANT_GRPC_PORT: 6334
      MEMPALACE_OLLAMA_URL: http://115.231.236.153:11434
      MEMPALACE_EMBEDDING_MODEL: mxbai-embed-large:latest
      MEMPALACE_EMBEDDING_DIMENSION: 1024
      MEMPALACE_REQUEST_TIMEOUT_SECONDS: 120
    volumes:
      - ~/.mempalace:/root/.mempalace
      - .:/app
    entrypoint: ["python", "-m", "mempalace.mcp_server"]
    stdin_open: true
    tty: false

volumes:
  qdrant_storage:
